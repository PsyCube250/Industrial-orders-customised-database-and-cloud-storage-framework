services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prodflow
      POSTGRES_PASSWORD: prodflow
      POSTGRES_DB: prodflow
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prodflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://prodflow:prodflow@db:5432/prodflow
      SECRET_KEY: change-me-in-production
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
  caddy_data:
  caddy_config:
